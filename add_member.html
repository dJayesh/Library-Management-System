{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1>👤Register new member</h1>
  <p><a href="/members" style="color:#0f6e56;">← Back to member List</a></p>
</div>

<div class="card" style="max-width:600px;">
  <div class="card-title">Enter Member Details</div>
  <form method="POST" action="/members/add">
    <div class="form-grid">
      <div class="form-group">
        <label>👤 Full Name *</label>
        <input name="name" required placeholder="e.g. Rahul Sharma">
      </div>
      <div class="form-group">
        <label>🪪 Member ID *</label>
        <input name="id" required placeholder="e.g. MEM003" style="text-transform:uppercase;">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>📞 Phone</label>
        <input name="phone" placeholder="e.g. 9876543210">
      </div>
      <div class="form-group">
        <label>📧 Email</label>
        <input name="email" type="email" placeholder="e.g. rahul@email.com">
      </div>
    </div>
    <div style="display:flex; gap:10px; margin-top:4px;">
      <button type="submit" class="btn btn-primary">✅ Register Member</button>
      <a href="/members" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
